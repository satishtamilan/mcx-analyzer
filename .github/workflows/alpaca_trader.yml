name: BTC V3 Sniper — Alpaca Auto Trader

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes: check position + hourly signal scan
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests pandas numpy alpaca-py

      - name: Run V3 Sniper trader
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          RISK_PCT:          ${{ vars.RISK_PCT || '2' }}
          SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
        run: python alpaca_trader.py
