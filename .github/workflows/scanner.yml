name: Crypto Alert Scanner

on:
  schedule:
    # Runs every 15 minutes during market hours (UTC)
    # Crypto markets are 24/7, so this runs all day
    - cron: '*/15 * * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests pandas numpy

      - name: Run scanner
        env:
          SENDER_EMAIL:      ${{ secrets.SENDER_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
          COINS:             ${{ vars.COINS || 'BTCUSDT,ETHUSDT' }}
          TIMEFRAME:         ${{ vars.TIMEFRAME || '15m' }}
          MIN_SCORE:         ${{ vars.MIN_SCORE || '5' }}
        run: python scanner.py
